# ─── HydroAtlas — Production Docker Compose ──────────────────────────
# Run the full stack using pre-built images: docker compose -f docker-compose.prod.yml up -d
# Uses Local SQLite and local storage.
# ─────────────────────────────────────────────────────────────────────

services:
  # ── One-off database migration runner ──────────────────────────────
  migrate:
    image: rudrapatra/hydroatlas-localserver:backend
    restart: "no"
    env_file:
      - ./backend/.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite+aiosqlite:///./data/hydroatlas.db
    volumes:
      - ./backend/data:/app/data
      - ./storage:/app/storage

  # ── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    image: rudrapatra/hydroatlas-localserver:backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    volumes:
      - ./backend/data:/app/data
      - ./storage:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite+aiosqlite:///./data/hydroatlas.db

  # ── ERA5 Scheduler / Ingestion ──────────────────────────────────────
  era5-scheduler:
    image: rudrapatra/hydroatlas-localserver:backend
    restart: "no"
    env_file:
      - ./backend/.env
    command: ["python", "-m", "ingestion.era5.scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend/data:/app/data
      - ./storage:/app/storage
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite+aiosqlite:///./data/hydroatlas.db
      ERA5_HISTORY_YEARS: "10"
      ERA5_SYNC_CONCURRENCY: "1"
      ERA5_SCHEDULER_TIMEZONE: UTC
      ERA5_SCHEDULER_RUN_ONCE: "true"

  # ── React / Vite Frontend ───────────────────────────────────────────
  frontend:
    image: rudrapatra/hydroatlas-localserver:frontend
    restart: unless-stopped
    depends_on:
      - backend

  # ── NGINX Reverse Proxy ─────────────────────────────────────────────
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # ── Ngrok Tunnel ────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: ["http", "nginx-proxy:80"]
    env_file:
      - ./backend/.env
    depends_on:
      - nginx-proxy
