# ─── HydroAtlas — Docker Compose ─────────────────────────────────────
# Run the full stack: docker compose up --build

# Uses local PostgreSQL database
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Local PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hydroatlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── One-off database migration runner ──────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - ./backend/.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/hydroatlas
    depends_on:
      - postgres

  # ── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/boundaries:/app/data/boundaries:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/hydroatlas

  # ── ERA5 Scheduler / Ingestion ──────────────────────────────────────
  era5-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - ./backend/.env
    command: ["python", "-m", "ingestion.era5.scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/hydroatlas
      ERA5_HISTORY_YEARS: "10"
      ERA5_SYNC_CONCURRENCY: "1"
      ERA5_SCHEDULER_TIMEZONE: UTC
      ERA5_SCHEDULER_RUN_ONCE: "true"

volumes:
  postgres_data:

  # ── React / Vite Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend